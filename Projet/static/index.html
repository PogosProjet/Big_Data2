<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Energie Pricer</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,300&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:       #f7f6f2;
    --white:    #ffffff;
    --ink:      #111111;
    --muted:    #8a8a8a;
    --rule:     #e0ddd6;
    --accent:   #d4500a;
    --success:  #1a7a4a;
    --danger:   #c0392b;
    --mono:     'DM Mono', monospace;
    --serif:    'Fraunces', Georgia, serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--mono);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 2rem 6rem;
  }

  .wrap {
    width: 100%;
    max-width: 800px;
  }

  /* Header */
  header {
    padding: 5rem 0 3.5rem;
    border-bottom: 2px solid var(--ink);
    margin-bottom: 3rem;
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: end;
    gap: 1rem;
  }

  .eyebrow {
    font-family: var(--mono);
    font-size: .68rem;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: .8rem;
    display: flex;
    align-items: center;
    gap: .5rem;
  }

  .eyebrow::before {
    content: '';
    display: inline-block;
    width: 18px;
    height: 2px;
    background: var(--accent);
  }

  h1 {
    font-family: var(--serif);
    font-weight: 700;
    font-size: clamp(2.8rem, 7vw, 4.8rem);
    line-height: .95;
    letter-spacing: -.02em;
    color: var(--ink);
  }

  h1 em {
    font-style: italic;
    font-weight: 300;
    color: var(--accent);
  }

  .header-right {
    font-size: .65rem;
    color: var(--muted);
    letter-spacing: .08em;
    text-transform: uppercase;
    text-align: right;
    line-height: 1.8;
    padding-bottom: .25rem;
  }

  .section-label {
    font-size: .62rem;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1rem;
  }

  /* Search */
  .search-block { margin-bottom: 2rem; }

  .search-row {
    display: flex;
    gap: 0;
    border: 1.5px solid var(--ink);
    border-radius: 2px;
    overflow: hidden;
    background: var(--white);
    transition: box-shadow .2s;
  }

  .search-row:focus-within {
    box-shadow: 4px 4px 0 var(--ink);
  }

  .id-input {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--ink);
    font-family: var(--mono);
    font-size: .88rem;
    padding: 1rem 1.25rem;
    outline: none;
    letter-spacing: .04em;
  }

  .id-input::placeholder { color: var(--rule); }

  .separator {
    width: 1.5px;
    background: var(--ink);
    flex-shrink: 0;
  }

  .btn-analyze {
    background: var(--ink);
    color: var(--white);
    border: none;
    font-family: var(--mono);
    font-weight: 500;
    font-size: .72rem;
    letter-spacing: .14em;
    text-transform: uppercase;
    padding: 1rem 1.6rem;
    cursor: pointer;
    transition: background .15s;
    display: flex;
    align-items: center;
    gap: .6rem;
    white-space: nowrap;
  }

  .btn-analyze:hover:not(:disabled) { background: var(--accent); }
  .btn-analyze:disabled { opacity: .35; cursor: not-allowed; }

  .arrow { transition: transform .2s; }
  .btn-analyze:hover:not(:disabled) .arrow { transform: translateX(4px); }

  /* Status */
  .status {
    margin-top: .85rem;
    font-size: .72rem;
    letter-spacing: .05em;
    color: var(--muted);
    min-height: 1em;
    display: flex;
    align-items: center;
    gap: .5rem;
  }

  .status.error   { color: var(--danger); }
  .status.success { color: var(--success); }

  .dots span {
    display: inline-block;
    animation: blink 1.2s infinite;
    opacity: 0;
  }
  .dots span:nth-child(2) { animation-delay: .2s; }
  .dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes blink { 0%,80%,100%{opacity:0} 40%{opacity:1} }

  /* Results */
  .results-section { animation: fadeUp .35s ease both; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .results-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding-bottom: .75rem;
    border-bottom: 2px solid var(--ink);
  }

  .results-title {
    font-family: var(--serif);
    font-weight: 700;
    font-size: 1.1rem;
    letter-spacing: -.01em;
  }

  .results-meta {
    font-size: .65rem;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  table { width: 100%; border-collapse: collapse; }

  thead th {
    font-size: .6rem;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--muted);
    padding: .75rem 0;
    text-align: left;
    border-bottom: 1px solid var(--rule);
    font-weight: 400;
  }

  thead th:last-child { text-align: right; }

  tbody tr {
    border-bottom: 1px solid var(--rule);
    transition: background .12s;
  }

  tbody tr:last-child { border-bottom: 1px solid var(--ink); }
  tbody tr:hover { background: rgba(0,0,0,.025); }

  tbody tr.best { background: #fff9f6; }
  tbody tr.best:hover { background: #fff3ee; }

  td { padding: 1.1rem 0; font-size: .85rem; vertical-align: middle; }

  .contract-cell {
    display: flex;
    align-items: center;
    gap: .9rem;
  }

  .rank {
    font-size: .65rem;
    color: var(--rule);
    width: 1.4rem;
    flex-shrink: 0;
    text-align: right;
  }

  .best .rank { color: var(--accent); font-weight: 500; }

  .badge-best {
    font-size: .55rem;
    letter-spacing: .12em;
    text-transform: uppercase;
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: .15rem .5rem;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .price-cell { text-align: right; }

  .price-value {
    font-family: var(--serif);
    font-size: 1.25rem;
    font-weight: 700;
    letter-spacing: -.02em;
    color: var(--ink);
  }

  .best .price-value { color: var(--accent); }

  .currency {
    font-family: var(--mono);
    font-size: .65rem;
    color: var(--muted);
    margin-left: .2rem;
    letter-spacing: .05em;
  }

  footer {
    margin-top: 5rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--rule);
    display: flex;
    justify-content: space-between;
    font-size: .6rem;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--rule);
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div>
      <p class="eyebrow">Outil d'analyse</p>
      <h1>Energie<br><em>Pricer</em></h1>
    </div>
    <div class="header-right">
      Comparaison<br>de contrats<br>d'énergie
    </div>
  </header>

  <div class="search-block">
    <p class="section-label">Identifiant de la série temporelle</p>
    <div class="search-row">
      <input
        class="id-input"
        id="tsId"
        type="text"
        placeholder="ex: 6055de6d5bca_naf7010"
        autocomplete="off"
        spellcheck="false"
      />
      <div class="separator"></div>
      <button class="btn-analyze" id="btnAnalyze" onclick="analyze()">
        Analyser <span class="arrow">→</span>
      </button>
    </div>
    <div class="status" id="status"></div>
  </div>

  <div id="results"></div>

  <footer>
    <span>Energie Pricer</span>
    <span>Données confidentielles</span>
  </footer>

</div>

<script>
  const input    = document.getElementById('tsId');
  const btn      = document.getElementById('btnAnalyze');
  const statusEl = document.getElementById('status');
  const resultsEl= document.getElementById('results');

  input.addEventListener('keydown', e => { if (e.key === 'Enter') analyze(); });

  function setStatus(msg, type = '') {
    statusEl.className = 'status ' + type;
    statusEl.innerHTML = msg;
  }

  function formatPrice(val) {
    if (val === null || val === undefined) return '—';
    return new Intl.NumberFormat('fr-FR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(val);
  }

  async function analyze() {
    const id = input.value.trim();
    if (!id) {
      setStatus('⚠ Veuillez renseigner un identifiant.', 'error');
      input.focus();
      return;
    }

    btn.disabled = true;
    resultsEl.innerHTML = '';
    setStatus('Analyse en cours <span class="dots"><span>.</span><span>.</span><span>.</span></span>');

    try {
      const res = await fetch('/analyze', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ id }),
      });

      let data;
      const rawText = await res.text();
      try {
        data = JSON.parse(rawText);
      } catch {
        setStatus('⚠ Erreur serveur (' + res.status + ') — vérifiez les logs uvicorn', 'error');
        console.error('Réponse non-JSON :', rawText);
        return;
      }

      if (!res.ok) {
        setStatus('⚠ ' + (data.detail || 'Erreur serveur'), 'error');
        return;
      }

      setStatus(
        '✓ ' + data.n_points.toLocaleString('fr-FR') + ' points analysés — ' + data.id,
        'success'
      );

      renderResults(data.results);

    } catch (err) {
      setStatus('⚠ Impossible de joindre le serveur : ' + err.message, 'error');
    } finally {
      btn.disabled = false;
    }
  }

  function renderResults(results) {
    if (!results || results.length === 0) {
      resultsEl.innerHTML = '<p class="status">Aucun résultat.</p>';
      return;
    }

    const rows = results.map((r, i) => {
      const isBest = i === 0;
      return '<tr class="' + (isBest ? 'best' : '') + '">'
        + '<td><div class="contract-cell">'
        + '<span class="rank">' + (i + 1) + '</span>'
        + '<span>' + r.contract + '</span>'
        + (isBest ? '<span class="badge-best">Optimal</span>' : '')
        + '</div></td>'
        + '<td class="price-cell">'
        + '<span class="price-value">' + formatPrice(r.price) + '</span>'
        + '<span class="currency">EUR</span>'
        + '</td></tr>';
    }).join('');

    resultsEl.innerHTML =
      '<section class="results-section">'
      + '<div class="results-header">'
      + '<span class="results-title">Comparaison des contrats</span>'
      + '<span class="results-meta">' + results.length + ' contrat' + (results.length > 1 ? 's' : '') + ' · prix croissant</span>'
      + '</div>'
      + '<table>'
      + '<thead><tr><th>Contrat</th><th>Prix total</th></tr></thead>'
      + '<tbody>' + rows + '</tbody>'
      + '</table></section>';
  }
</script>
</body>
</html>
